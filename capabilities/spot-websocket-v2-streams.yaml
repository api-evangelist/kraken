naftiko: 1.0.0-alpha2
info:
  label: Kraken Spot WebSocket API v2 — Streams
  description: Kraken Spot WebSocket API v2 — Streams. 12 channel operations covering ticker, book, ohlc, trade, instrument, and the connection-level ping/heartbeat/status frames. Self-contained Naftiko capability covering one Kraken business surface.
  tags:
    - Kraken
    - Cryptocurrency
    - Streams
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
  - namespace: env
    keys:
      KRAKEN_WS_TOKEN: KRAKEN_WS_TOKEN
capability:
  consumes:
    - type: websocket
      namespace: spot-websocket-v2-streams
      baseUri: wss://ws.kraken.com/v2
      description: Kraken Spot WebSocket API v2 — Streams business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.KRAKEN_WS_TOKEN}}'
      resources:
        - name: channels
          path: /
          operations:
            - name: subscribe-ticker
              method: RECEIVE
              description: Receive ticker snapshot and updates from the server.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-ticker
              method: SUBSCRIBE
              description: Subscribe or unsubscribe from the ticker channel.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: subscribe-book
              method: RECEIVE
              description: Receive book snapshot and update messages.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-book
              method: SUBSCRIBE
              description: Subscribe or unsubscribe from the book channel.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: subscribe-ohlc
              method: RECEIVE
              description: Receive OHLC snapshot and update messages.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-ohlc
              method: SUBSCRIBE
              description: Subscribe or unsubscribe from the ohlc channel.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: subscribe-trade
              method: RECEIVE
              description: Receive trade snapshot and update messages.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-trade
              method: SUBSCRIBE
              description: Subscribe or unsubscribe from the trade channel.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: subscribe-instrument
              method: RECEIVE
              description: Receive instrument snapshot and update messages.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-instrument
              method: SUBSCRIBE
              description: Subscribe or unsubscribe from the instrument channel.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: subscribe-ping
              method: RECEIVE
              description: Receive pong response from the server.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: publish-ping
              method: SUBSCRIBE
              description: Send a ping to the server.
              inputParameters:
                - name: channel
                  in: body
                  type: string
                  required: true
                  description: Channel name.
                - name: params
                  in: body
                  type: object
                  required: false
                  description: Channel-specific subscribe params.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: spot-websocket-v2-streams-rest
      port: 8080
      description: REST adapter for Kraken Spot WebSocket API v2 — Streams.
      resources:
        - path: /v1/streams/ticker/subscribe
          name: ticker-subscribe
          description: REST surface for ticker subscribe.
          operations:
            - method: POST
              name: subscribe-ticker
              description: Receive ticker snapshot and updates from the server.
              call: spot-websocket-v2-streams.subscribe-ticker
              with:
                channel: rest.channel
                params: rest.params
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/streams/ticker/publish
          name: ticker-publish
          description: REST surface for ticker publish.
          operations:
            - method: POST
              name: publish-ticker
              description: Subscribe or unsubscribe from the ticker channel.
              call: spot-websocket-v2-streams.publish-ticker
              with:
                channel: rest.channel
                params: rest.params
              outputParameters:
                - type: object
                  mapping: $.
