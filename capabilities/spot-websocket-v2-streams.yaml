      namespace: spot-websocket-v2-streams-mcp
      port: 9090
      transport: http
      description: MCP adapter for Kraken Spot WebSocket API v2 — Streams.
      tools:
        - name: receive-ticker-snapshot-and-updates
          description: Receive ticker snapshot and updates from the server.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: spot-websocket-v2-streams.subscribe-ticker
          with:
            channel: tools.channel
            params: tools.params
          outputParameters:
            - type: object
              mapping: $.
        - name: subscribe-unsubscribe-ticker-channel
          description: Subscribe or unsubscribe from the ticker channel.
