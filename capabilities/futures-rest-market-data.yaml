naftiko: 1.0.0-alpha2
info:
  label: Kraken Futures REST API — Market Data
  description: 'Kraken Futures REST API — Market Data. 6 operations. Lead operation: Kraken Get Instruments. Self-contained Naftiko capability covering one Kraken business surface.'
  tags:
    - Kraken
    - Cryptocurrency
    - Market Data
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
  - namespace: env
    keys:
      KRAKEN_FUTURES_API_KEY: KRAKEN_FUTURES_API_KEY
capability:
  consumes:
    - type: http
      namespace: futures-rest-market-data
      baseUri: https://futures.kraken.com/derivatives/api/v3
      description: Kraken Futures REST API — Market Data business capability. Self-contained, no shared references.
      authentication:
        type: apikey
        key: API-Key
        value: '{{env.KRAKEN_FUTURES_API_KEY}}'
        placement: header
      resources:
        - name: instruments
          path: /instruments
          operations:
            - name: getInstruments
              method: GET
              description: Kraken Get Instruments
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: instruments-status
          path: /instruments/status
          operations:
            - name: getInstrumentsStatus
              method: GET
              description: Kraken Get Instruments Status
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: tickers
          path: /tickers
          operations:
            - name: getTickers
              method: GET
              description: Kraken Get Tickers
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: tickers-symbol
          path: /tickers/{symbol}
          operations:
            - name: getTickerForSymbol
              method: GET
              description: Kraken Get Ticker for Symbol
              inputParameters:
                - name: symbol
                  in: path
                  type: string
                  required: true
                  description: symbol
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: orderbook
          path: /orderbook
          operations:
            - name: getOrderBookFutures
              method: GET
              description: Kraken Get Order Book (Futures)
              inputParameters:
                - name: symbol
                  in: query
                  type: string
                  required: true
                  description: symbol
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: history
          path: /history
          operations:
            - name: getMarketHistory
              method: GET
              description: Kraken Get Market History
              inputParameters:
                - name: symbol
                  in: query
                  type: string
                  required: true
                  description: symbol
                - name: lastTime
                  in: query
                  type: string
                  required: false
                  description: lastTime
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: futures-rest-market-data-rest
      port: 8080
      description: REST adapter for Kraken Futures REST API — Market Data. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/instruments
          name: instruments
          description: REST surface for /instruments.
          operations:
            - method: GET
              name: getInstruments
              description: Kraken Get Instruments
              call: futures-rest-market-data.getInstruments
              with: {}
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/instruments/status
          name: instruments-status
          description: REST surface for /instruments/status.
          operations:
            - method: GET
              name: getInstrumentsStatus
              description: Kraken Get Instruments Status
              call: futures-rest-market-data.getInstrumentsStatus
              with: {}
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/tickers
          name: tickers
          description: REST surface for /tickers.
          operations:
            - method: GET
              name: getTickers
              description: Kraken Get Tickers
              call: futures-rest-market-data.getTickers
              with: {}
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/tickers/{symbol}
          name: tickers-symbol
          description: REST surface for /tickers/{symbol}.
          operations:
            - method: GET
              name: getTickerForSymbol
              description: Kraken Get Ticker for Symbol
              call: futures-rest-market-data.getTickerForSymbol
              with:
                symbol: rest.symbol
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/orderbook
          name: orderbook
          description: REST surface for /orderbook.
          operations:
            - method: GET
              name: getOrderBookFutures
              description: Kraken Get Order Book (Futures)
              call: futures-rest-market-data.getOrderBookFutures
              with:
                symbol: rest.symbol
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/history
          name: history
          description: REST surface for /history.
          operations:
            - method: GET
              name: getMarketHistory
              description: Kraken Get Market History
              call: futures-rest-market-data.getMarketHistory
              with:
                symbol: rest.symbol
                lastTime: rest.lastTime
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: futures-rest-market-data-mcp
      port: 9090
      transport: http
      description: MCP adapter for Kraken Futures REST API — Market Data. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: kraken-get-instruments
          description: Kraken Get Instruments
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getInstruments
          with: {}
          outputParameters:
            - type: object
              mapping: $.
        - name: kraken-get-instruments-status
          description: Kraken Get Instruments Status
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getInstrumentsStatus
          with: {}
          outputParameters:
            - type: object
              mapping: $.
        - name: kraken-get-tickers
          description: Kraken Get Tickers
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getTickers
          with: {}
          outputParameters:
            - type: object
              mapping: $.
        - name: kraken-get-ticker-symbol
          description: Kraken Get Ticker for Symbol
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getTickerForSymbol
          with:
            symbol: tools.symbol
          outputParameters:
            - type: object
              mapping: $.
        - name: kraken-get-order-book
          description: Kraken Get Order Book (Futures)
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getOrderBookFutures
          with:
            symbol: tools.symbol
          outputParameters:
            - type: object
              mapping: $.
        - name: kraken-get-market-history
          description: Kraken Get Market History
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: futures-rest-market-data.getMarketHistory
          with:
            symbol: tools.symbol
            lastTime: tools.lastTime
          outputParameters:
            - type: object
              mapping: $.
