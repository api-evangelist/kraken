        key: API-Key
        value: '{{env.KRAKEN_API_KEY}}'
        placement: header
      resources:
        - name: 0-private-addorder
          path: /0/private/AddOrder
          operations:
            - name: addOrder
              method: POST
              description: Kraken Add Order
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Request body payload.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: 0-private-addorderbatch
          path: /0/private/AddOrderBatch
