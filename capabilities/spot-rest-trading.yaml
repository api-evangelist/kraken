naftiko: 1.0.0-alpha2
info:
  label: Kraken Spot REST API — Trading
  description: 'Kraken Spot REST API — Trading. 8 operations. Lead operation: Kraken Add Order. Self-contained Naftiko capability covering one Kraken business surface.'
  tags:
    - Kraken
    - Cryptocurrency
    - Trading
  created: '2026-05-30'
  modified: '2026-05-30'
