generated: '2026-06-20'
method: searched
source: https://github.com/krakenfx/kraken-cli
description: >-
  The official Kraken CLI (krakenfx/kraken-cli) — a Rust, AI-native command-line
  client over the Kraken Spot, Futures, and Earn REST/WebSocket surfaces. It
  embeds a Model Context Protocol server (`kraken mcp`) exposing 151 tools, so
  the same binary is both a human CLI and an agent tool provider. The binary is
  catalogued in packages/kraken-packages.yml; this artifact enumerates its
  command surface. The embedded MCP server is profiled in mcp/kraken-mcp.yml.
repo: https://github.com/krakenfx/kraken-cli
language: rust
install:
  installer_script: >-
    curl --proto '=https' --tlsv1.2 -LsSf
    https://github.com/krakenfx/kraken-cli/releases/latest/download/kraken-cli-installer.sh | sh
  cargo: cargo install --git https://github.com/krakenfx/kraken-cli
  binaries: Pre-built macOS and Linux binaries from GitHub Releases
auth:
  env:
    - KRAKEN_API_KEY
    - KRAKEN_API_SECRET
    - KRAKEN_FUTURES_API_KEY
    - KRAKEN_FUTURES_API_SECRET
  config_file: ~/.config/kraken/config.toml
  flags: [--api-key, --api-secret]
  interactive: kraken setup
commands:
