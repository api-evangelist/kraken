openapi: 3.0.3
info:
  title: Kraken Futures REST Account Transfers API
  version: 3.0.0
  description: OpenAPI description of the Kraken Futures (formerly Crypto Facilities) REST API v3. Covers trading (send/edit/cancel orders, batch), market data (instruments, tickers, orderbook, history), account data (accounts, open positions, open orders, fills), transfers, account history, and charts. Generated by the API Evangelist pipeline from docs.kraken.com/api/docs/futures-api/.
  contact:
    name: Kraken API Support
    url: https://support.kraken.com/
  license:
    name: Kraken Terms of Service
    url: https://www.kraken.com/legal
  x-generated-from: documentation
  x-last-validated: '2026-05-30'
servers:
- url: https://futures.kraken.com/derivatives/api/v3
  description: Kraken Futures production REST endpoint
- url: https://demo-futures.kraken.com/derivatives/api/v3
  description: Kraken Futures demo / sandbox endpoint
- url: https://colo-london.vip.futures.kraken.com/derivatives/api/v3
  description: Kraken Futures colocation endpoint (London VIP)
tags:
- name: Transfers
  description: Wallet, margin, and subaccount transfers
paths:
  /transfer:
    post:
      operationId: transferFutures
      summary: Kraken Transfer Funds (Futures)
      description: Transfers funds between a Spot wallet and a Futures account, or between Futures accounts.
      tags:
      - Transfers
      security:
      - futures_signature: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - amount
              - fromAccount
              - toAccount
              - unit
              properties:
                amount:
                  type: number
                fromAccount:
                  type: string
                toAccount:
                  type: string
                unit:
                  type: string
            examples:
              transferFuturesRequestExample:
                summary: Default transferFutures request
                x-microcks-default: true
                value:
                  amount: 0.01
                  fromAccount: string
                  toAccount: string
                  unit: string
      responses:
        '200':
          description: Transfer acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseEnvelope'
              examples:
                transferFutures200Example:
                  summary: Default transferFutures 200 response
                  x-microcks-default: true
                  value:
                    result: success
                    serverTime: '2026-05-30T00:00:00Z'
                    error: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /withdrawal:
    post:
      operationId: withdrawalFutures
      summary: Kraken Withdrawal (Futures)
      description: Initiates a withdrawal from a Futures wallet to a Spot wallet.
      tags:
      - Transfers
      security:
      - futures_signature: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - amount
              - currency
              - targetAddress
              properties:
                amount:
                  type: number
                currency:
                  type: string
                targetAddress:
                  type: string
            examples:
              withdrawalFuturesRequestExample:
                summary: Default withdrawalFutures request
                x-microcks-default: true
                value:
                  amount: 0.01
                  currency: string
                  targetAddress: string
      responses:
        '200':
          description: Withdrawal acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseEnvelope'
              examples:
                withdrawalFutures200Example:
                  summary: Default withdrawalFutures 200 response
                  x-microcks-default: true
                  value:
                    result: success
                    serverTime: '2026-05-30T00:00:00Z'
                    error: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    BaseEnvelope:
      type: object
      properties:
        result:
          type: string
          enum:
          - success
          - error
          example: success
        serverTime:
          type: string
          format: date-time
          example: '2026-05-30T00:00:00Z'
        error:
          type: string
          example: string
  securitySchemes:
    futures_signature:
      type: apiKey
      in: header
      name: APIKey
      description: 'Kraken Futures signs requests with two headers: `APIKey` (public key) and `Authent` (base64 HMAC-SHA512 over `postData + nonce + endpointPath` using the SHA-256 hash of those values, then HMAC-SHA512 keyed by the base64-decoded secret). A `Nonce` header carries the incrementing nonce.'
