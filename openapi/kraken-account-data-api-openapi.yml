  /0/private/TradeVolume:
    post:
      operationId: getTradeVolume
      summary: Kraken Get Trade Volume
      description: Returns the account's 30-day trade volume and the fee tier currently applied.
      tags:
      - Account Data
      security:
      - kraken_signature: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TradeVolumeRequest'
            examples:
              getTradeVolumeRequestExample:
                summary: Default getTradeVolume request
                x-microcks-default: true
                value:
                  nonce: 1717000000000
                  otp: '123456'
                  pair: XBTUSD
                  fee-info: true
      responses:
        '200':
          description: Trade volume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeVolumeResponse'
              examples:
                getTradeVolume200Example:
                  summary: Default getTradeVolume 200 response
                  x-microcks-default: true
                  value:
                    error: []
                    result: {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    OpenOrdersRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          trades:
            type: boolean
            default: false
            example: true
          userref:
            type: integer
            example: 1
          cl_ord_id:
            type: string
            example: OQCLML-BW3P3-BUCMWZ
    QueryOrdersResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/OrderInfo'
            example: {}
    OrderInfo:
      type: object
      properties:
        refid:
          type: string
          nullable: true
          example: OQCLML-BW3P3-BUCMWZ
        userref:
          type: integer
          nullable: true
          example: 1
        cl_ord_id:
          type: string
          nullable: true
          example: OQCLML-BW3P3-BUCMWZ
        status:
          type: string
          enum:
          - pending
          - open
          - closed
          - canceled
          - expired
          example: pending
        opentm:
          type: number
          example: 0.01
        starttm:
          type: number
          example: 0.01
        expiretm:
          type: number
          example: 0.01
        descr:
          type: object
          properties:
            pair:
              type: string
              example: XBTUSD
            type:
              type: string
              enum:
              - buy
              - sell
              example: buy
            ordertype:
              type: string
              example: limit
            price:
              type: string
              example: '0.01'
            price2:
              type: string
              example: '0.01'
            leverage:
              type: string
              example: none
            order:
              type: string
              example: string
            close:
              type: string
              example: string
          example: {}
        vol:
          type: string
          example: '0.01'
        vol_exec:
          type: string
          example: '0.01'
        cost:
          type: string
          example: '0.01'
        fee:
          type: string
          example: '0.01'
        price:
          type: string
          example: '0.01'
        stopprice:
          type: string
          example: '0.01'
        limitprice:
          type: string
          example: '0.01'
        misc:
          type: string
          example: string
        oflags:
          type: string
          example: string
        trades:
          type: array
          items:
            type: string
          example: []
    OpenOrdersResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            properties:
              open:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/OrderInfo'
                example: {}
            example: {}
    ClosedOrdersRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          trades:
            type: boolean
            default: false
            example: true
          userref:
            type: integer
            example: 1
          cl_ord_id:
            type: string
            example: OQCLML-BW3P3-BUCMWZ
          start:
            type: integer
            example: 1
          end:
            type: integer
            example: 1
          ofs:
            type: integer
            example: 1
          closetime:
            type: string
            enum:
            - open
            - close
            - both
            default: both
            example: open
    LedgersRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          asset:
            type: string
            default: all
            example: XBT
          aclass:
            type: string
            default: currency
            example: string
          type:
            type: string
            enum:
            - all
            - deposit
            - withdrawal
            - trade
            - margin
            - rollover
            - credit
            - transfer
            - settled
            - staking
            - dividend
            - sale
            - nft_rebate
            - conversion
            - allocation
            - deallocation
            - earn
            default: all
            example: all
          start:
            type: integer
            example: 1
          end:
            type: integer
            example: 1
          ofs:
            type: integer
            example: 1
    NoncedRequest:
      type: object
      description: All private requests include an incrementing nonce. Optionally an OTP for two-factor-protected keys.
      required:
      - nonce
      properties:
        nonce:
          type: integer
          format: int64
          example: 1717000000000
        otp:
          type: string
          description: Two-factor password / OTP if the key is OTP-protected.
          example: '123456'
    OpenPositionsRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          txid:
            type: string
            example: OQCLML-BW3P3-BUCMWZ
          docalcs:
            type: boolean
            default: false
            example: true
          consolidation:
            type: string
            enum:
            - market
            example: market
    QueryLedgersRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        required:
        - id
        properties:
          id:
            type: string
            description: Comma-delimited list of ledger ids (up to 20).
            example: OQCLML-BW3P3-BUCMWZ
          trades:
            type: boolean
            example: true
    LedgerEntry:
      type: object
      properties:
        refid:
          type: string
          example: OQCLML-BW3P3-BUCMWZ
        time:
          type: number
          example: '2026-05-30T00:00:00Z'
        type:
          type: string
          example: buy
        subtype:
          type: string
          example: string
        aclass:
          type: string
          example: string
        asset:
          type: string
          example: XBT
        amount:
          type: string
          example: '0.01'
        fee:
          type: string
          example: '0.01'
        balance:
          type: string
          example: '0.01'
    ClosedOrdersResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            properties:
              closed:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/OrderInfo'
                example: {}
              count:
                type: integer
                example: 1
            example: {}
    QueryOrdersRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        required:
        - txid
        properties:
          trades:
            type: boolean
            example: true
          userref:
            type: integer
            example: 1
          cl_ord_id:
            type: string
            example: OQCLML-BW3P3-BUCMWZ
          txid:
            type: string
            description: Comma-delimited list of txids (up to 50).
            example: OQCLML-BW3P3-BUCMWZ
    LedgersResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            properties:
              ledger:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/LedgerEntry'
                example: {}
              count:
                type: integer
                example: 1
            example: {}
    TradesHistoryRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          type:
            type: string
            enum:
            - all
            - any position
            - closed position
            - closing position
            - no position
            default: all
            example: all
          trades:
            type: boolean
            example: true
          start:
            type: integer
            example: 1
          end:
            type: integer
            example: 1
          ofs:
            type: integer
            example: 1
    QueryLedgersResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/LedgerEntry'
            example: {}
    TradeBalanceRequest:
      allOf:
      - $ref: '#/components/schemas/NoncedRequest'
      - type: object
        properties:
          asset:
            type: string
            default: ZUSD
            example: XBT
    OpenPositionsResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/Position'
            example: {}
    TradeBalanceResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            properties:
              eb:
                type: string
                description: Equivalent balance
                example: string
              tb:
                type: string
                description: Trade balance
                example: string
              m:
                type: string
                description: Margin used
                example: string
              n:
                type: string
                description: Unrealized P&L
                example: string
              c:
                type: string
                description: Cost basis of positions
                example: string
              v:
                type: string
                description: Current valuation of positions
                example: string
              e:
                type: string
                description: Equity
                example: string
              mf:
                type: string
                description: Free margin
                example: string
              ml:
                type: string
                description: Margin level
                example: string
              uv:
                type: string
                description: Unexecuted value
                example: string
            example: {}
    TradeVolumeResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            properties:
              currency:
                type: string
                example: string
              volume:
                type: string
                example: '0.01'
              fees:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    fee:
                      type: string
                    minfee:
                      type: string
                    maxfee:
                      type: string
                    nextfee:
                      type: string
                    nextvolume:
                      type: string
                    tiervolume:
                      type: string
                example: {}
              fees_maker:
                type: object
                additionalProperties:
                  type: object
                example: {}
            example: {}
    QueryTradesResponse:
      allOf:
      - $ref: '#/components/schemas/BaseEnvelope'
      - type: object
        properties:
          result:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/TradeInfo'
            example: {}
    TradesHistoryResponse:
