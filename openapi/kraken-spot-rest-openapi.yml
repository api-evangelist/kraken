      tags: [WebSocket]
      security: [kraken_signature: []]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoncedRequest'
            examples:
              getWebSocketsTokenRequestExample:
                summary: Default getWebSocketsToken request
                x-microcks-default: true
                value:
                  nonce: 1717000000000
                  otp: '123456'
      responses:
        '200':
          description: WebSocket token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSocketsTokenResponse'
              examples:
                getWebSocketsToken200Example:
                  summary: Default getWebSocketsToken 200 response
                  x-microcks-default: true
                  value:
                    error: []
                    result: {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    kraken_signature:
      type: apiKey
      in: header
      name: API-Key
      description: >-
        Kraken signs private REST requests with two headers: `API-Key` (your
        public API key) and `API-Sign` (HMAC-SHA512 of the URI path plus
        SHA256(nonce + POST body), keyed by the base64-decoded secret). All
        private endpoints must include an incrementing `nonce` in the POST
        body.
  schemas:
    BaseEnvelope:
      type: object
      properties:
        error:
          type: array
          items: {type: string}
          description: Array of error strings; empty on success.
          example: []
        result:
          description: Endpoint-specific result object.
          example: string
      required: [error]
    NoncedRequest:
      type: object
      description: All private requests include an incrementing nonce. Optionally an OTP for two-factor-protected keys.
      required: [nonce]
      properties:
        nonce:
          type: integer
          format: int64
          example: 1717000000000
        otp:
          type: string
          description: Two-factor password / OTP if the key is OTP-protected.
          example: '123456'
    AssetScopedRequest:
      allOf:
        - $ref: '#/components/schemas/NoncedRequest'
        - type: object
          required: [asset]
          properties:
            asset:
              type: string
              example: XBT
    EarnStrategyScopedRequest:
      allOf:
        - $ref: '#/components/schemas/NoncedRequest'
        - type: object
          required: [strategy_id]
          properties:
            strategy_id:
              type: string
              example: OQCLML-BW3P3-BUCMWZ
    ServerTimeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            result:
              type: object
              properties:
                unixtime: {type: integer, example: 1717000000}
                rfc1123: {type: string, example: "Mon, 27 May 26 00:00:00 +0000"}
              example: {}
    SystemStatusResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            result:
              type: object
              properties:
                status: {type: string, enum: [online, maintenance, cancel_only, post_only], example: online}
                timestamp: {type: string, format: date-time, example: '2026-05-30T00:00:00Z'}
              example: {}
    AssetInfoResponse:
      allOf:
