  /0/public/Trades:
    get:
      operationId: getRecentTrades
      summary: Kraken Get Recent Trades
      description: Returns recent trades for a pair, optionally since a cursor.
      tags: [Market Data]
      parameters:
        - name: pair
          in: query
          required: true
          schema: {type: string}
          example: XBTUSD
        - name: since
          in: query
          required: false
          schema: {type: integer}
          example: 1
        - name: count
          in: query
          required: false
          description: Maximum number of trades (1-1000)
          schema: {type: integer, default: 1000}
          example: 1
      responses:
        '200':
          description: Recent trades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentTradesResponse'
              examples:
                getRecentTrades200Example:
