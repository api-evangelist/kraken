aid: kraken
name: Kraken
description: Kraken is one of the world's largest and longest-running cryptocurrency
  exchanges, founded in 2011 and headquartered in San Francisco. Kraken offers Spot
  and Futures trading, staking and yield through Kraken Earn, NFT marketplace access,
  OTC services, custody, prime brokerage, and a B2B Embed surface for partners. Kraken
  exposes a comprehensive set of APIs spanning REST, WebSocket, and FIX across the
  Spot exchange, Futures exchange (Kraken Futures, formerly Crypto Facilities), institutional
  services (Custody, OTC, Prime), and partner integration surfaces (Embed, Ramp, OAuth).
url: https://docs.kraken.com/api/
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-30'
