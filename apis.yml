    url: https://docs.kraken.com/api/docs/category/futures-websocket
  - type: APIReference
    url: https://docs.kraken.com/api/docs/futures-websocket/feeds/heartbeat
- name: Kraken FIX API
  description: FIX 4.4 / 5.0 SP2 protocol access for Kraken Spot and Futures, used
    by institutional and high-frequency clients. Provides order management (NewOrderSingle,
    OrderCancelRequest, OrderCancelReplaceRequest, etc.) and market data request flows
    (MarketDataRequest, MarketDataSnapshot/Refresh).
  humanURL: https://docs.kraken.com/api/docs/category/fix-api/
  baseURL: colo-london.vip-fix.kraken.com
  tags:
  - FIX
  - Institutional
  - Spot
  - Futures
  properties:
