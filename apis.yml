- name: Kraken Embed REST API
  description: B2B integration API enabling partners to embed Kraken trading, custody,
    and Earn capabilities into their own products. Provides user management, assets,
    deposits, withdrawals, quote-based and custom orders, portfolio, Earn features,
    and webhooks for real-time event delivery.
  humanURL: https://docs.kraken.com/api/docs/category/embed/
  baseURL: https://embed.kraken.com
  tags:
  - Embed
