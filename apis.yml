    url: https://docs.kraken.com/api/docs/category/fix-api/
  - type: Authentication
    url: https://docs.kraken.com/api/docs/guides/fix-api-auth
- name: Kraken NFT API
  description: 'REST API for Kraken''s NFT marketplace surfaces: collections, asset
    lookups, listings, offers, watchlist, and user portfolio views. The NFT API is
    consumed alongside the Spot REST API using the same API key authentication scheme.'
  humanURL: https://docs.kraken.com/api/docs/category/nft-rest/
  baseURL: https://api.kraken.com
  tags:
