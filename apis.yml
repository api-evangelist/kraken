- type: Features
  data:
  - name: Spot Trading
    description: Spot trading on 200+ cryptocurrency pairs with limit, market, stop
      loss, take profit, stop-loss-limit, take-profit-limit, settle position, trailing
      stop, and iceberg order types.
  - name: Margin Trading
    description: Margin trading on supported pairs with leverage up to 5x for eligible
      users in eligible jurisdictions.
  - name: Futures Trading
    description: Perpetual and fixed-maturity futures on Bitcoin, Ethereum, and other
      major assets via Kraken Futures.
  - name: Kraken Earn (Staking and Yield)
    description: On-chain and off-chain staking plus opt-in bonded yield strategies
      across supported proof-of-stake and DeFi assets.
  - name: NFT Marketplace
    description: Browse, list, bid, and buy NFTs across Ethereum and Solana with gas-free
      transactions and fiat settlement.
  - name: Subaccounts
    description: Logical subaccount creation and inter-account transfers for institutional
      and family-office structuring.
  - name: Embed (B2B Integration)
    description: White-label trading, custody, and Earn primitives that partners can
      embed into their own consumer or business products.
  - name: OAuth Delegated Access
    description: OAuth 2.0 surface enabling third-party apps to act on a user's behalf
      with scoped permissions.
  - name: Co-located Connectivity
    description: Colocation endpoints in London (colo-london.*) for ultra-low-latency
      access to Spot, Futures, FIX, and WebSocket surfaces.
  - name: FIX Connectivity
    description: FIX 4.4 / 5.0 SP2 connectivity for institutional execution and market
      data flows.
  - name: WebSocket v2 with Authenticated Trading
    description: Modern WebSocket v2 surface supporting subscribe/unsubscribe for
      market data and authenticated request/response trading methods.
  - name: Cancel on Disconnect
    description: Automatic cancellation of resting orders when the trading session
      terminates, protecting algorithmic strategies from runaway risk.
- type: UseCases
  data:
  - name: Algorithmic Spot Trading
    description: Build and operate automated trading strategies against Kraken Spot
      using REST for order management and WebSocket v2 for low-latency market data
      and execution streams.
  - name: Cross-Exchange Arbitrage
    description: Use real-time order book and ticker feeds with low-latency colocation
      endpoints to power arbitrage strategies across Kraken and other venues.
  - name: Derivatives Market Making
    description: Run market-making strategies on Kraken Futures using batched order
      entry, WebSocket fills, and FIX for high-volume connectivity.
  - name: Treasury and Custody Operations
    description: Manage corporate or fund treasury balances using Kraken Custody and
      programmatic transfers, deposits, and withdrawals.
  - name: Staking-as-a-Service
    description: Offer staking and yield products to end users via Kraken Earn allocation/deallocation
      endpoints, exposed through your own product.
  - name: Embedded Crypto Brokerage
    description: Partners (fintechs, neobanks, wallets) use Kraken Embed to add trading,
      conversion, and custody capabilities to their own apps without building exchange
      infrastructure.
  - name: NFT Portfolio Management
    description: Use the NFT API to power portfolio dashboards, valuation feeds, and
      collection-level analytics.
  - name: AI Agent Trading
    description: Use the Kraken CLI's built-in MCP server (or the community oilst/kraken-mcp)
      to let LLM agents place orders, manage positions, and stream market data with
      tool-calling.
  - name: Tax and Reporting Pipelines
    description: Pull trades history, ledgers, deposits, and withdrawals to drive
      tax-lot accounting, regulatory reporting, and audit pipelines.
- type: Integrations
  data:
  - name: Crypto Facilities (Kraken Futures)
    description: Kraken Futures uses the Crypto Facilities REST v3 and WebSocket v1
      protocols, with public GitHub example clients in multiple languages.
  - name: Kraken Wallet
    description: Self-custody wallet that signs transactions locally; integrates with
      dApps and uses Kraken-published OAuth helpers.
  - name: Model Context Protocol
    description: The Kraken CLI ships an embedded MCP server so any MCP-compatible
      agent runtime (Claude, Gemini, Cursor) can drive Kraken accounts.
  - name: TradingView
    description: Kraken markets are available as a charting source on TradingView,
      and Kraken Pro embeds TradingView charts in its web client.
  - name: CCXT
    description: Kraken Spot is supported as a first-class exchange adapter in the
      CCXT cryptocurrency exchange library.
- type: Solutions
  data:
  - name: Kraken
    description: The simplified Kraken consumer app for buying, selling, sending,
      and staking crypto with a fixed 1.0% / 1.5% spread on instant and custom orders.
  - name: Kraken Pro
    description: The advanced trading platform with full Spot, Margin, and Futures
      surfaces, volume-tiered maker/taker fees from 0.25%/0.40% down to 0.00%/0.10%
      at $10M+ 30-day USD volume.
  - name: Kraken Institutional
    description: Institutional offering bundling Custody, OTC, Prime brokerage, colocation,
      FIX, and dedicated relationship management.
  - name: Kraken Embed
    description: B2B integration platform letting partners offer Kraken trading, custody,
      and Earn primitives inside their own products.
