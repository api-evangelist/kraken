    url: https://docs.kraken.com/api/docs/category/nft-rest/
- name: Kraken Earn API
  description: REST endpoints for Kraken Earn (staking, yield, rewards). Lists strategies,
    allocates funds to a strategy, deallocates funds, and surfaces allocation status
    and reward history.
  humanURL: https://docs.kraken.com/api/docs/rest-api/allocate-strategy
  baseURL: https://api.kraken.com
  tags:
