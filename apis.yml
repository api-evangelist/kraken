apis:
- name: Kraken Spot REST API
  description: Public and private REST endpoints for the Kraken Spot exchange. Covers
    public market data (server time, system status, asset info, ticker, OHLC, order
    book depth, recent trades, recent spreads), private account data (balances, trade
    balance, open orders, closed orders, query orders, trades history, query trades,
    open positions, ledgers, query ledgers, trade volume, API key info), trading (add
    order, edit order, amend order, cancel order, cancel all, cancel all orders after,
    add order batch, cancel order batch), funding (deposit methods, deposit addresses,
    deposit status, withdraw info, withdraw, withdraw status, withdrawal cancel, wallet
    transfer), subaccounts (create, transfer), Earn (allocate, deallocate, allocations,
    allocation status, strategies), and the WebSocket token endpoint used to authorize
    private WebSocket subscriptions.
  humanURL: https://docs.kraken.com/api/docs/rest-api/get-server-time
  baseURL: https://api.kraken.com
  tags:
  - Spot
  - REST
  - Trading
  - Market Data
  - Funding
  - Earn
  properties:
  - type: Documentation
    url: https://docs.kraken.com/api/docs/rest-api/get-server-time
  - type: APIReference
    url: https://docs.kraken.com/api/docs/category/spot-rest/
  - type: Authentication
    url: https://docs.kraken.com/api/docs/guides/spot-rest-auth
  - type: RateLimits
    url: https://support.kraken.com/articles/206548367-what-are-the-api-rate-limits
  - type: OpenAPI
    url: openapi/kraken-spot-rest-openapi.yml
  - url: graphql/kraken-graphql.md
    type: GraphQL
- name: Kraken Spot WebSocket API v2
  description: Real-time market data and private user data over WebSocket v2 using
    subscribe/unsubscribe semantics. Public channels include ticker (L1), book (L2),
    trade, ohlc, instrument, and admin frames (status, heartbeat, ping/pong). Authenticated
    channels include executions and balances. Trading methods include add_order, amend_order,
    edit_order, cancel_order, cancel_all, cancel_on_disconnect, batch_add, and batch_cancel.
    The authenticated endpoint requires a token obtained from the Spot REST GetWebSocketsToken
    operation.
  humanURL: https://docs.kraken.com/api/docs/websocket-v2/ping
  baseURL: wss://ws.kraken.com/v2
  tags:
  - Spot
  - WebSocket
  - Market Data
  - Trading
  properties:
  - type: Documentation
    url: https://docs.kraken.com/api/docs/category/websocket-v2/
  - type: APIReference
    url: https://docs.kraken.com/api/docs/websocket-v2/ping
  - type: Authentication
    url: https://docs.kraken.com/api/docs/guides/spot-ws-auth
  - type: AsyncAPI
    url: asyncapi/kraken-asyncapi.yml
- name: Kraken Spot WebSocket API v1 (Legacy)
  description: Legacy Kraken Spot WebSocket API. Continues to operate alongside v2
    but v2 is the recommended path for new integrations. Public channels include ticker,
    book, trade, ohlc, spread; private channels include ownTrades and openOrders.
  humanURL: https://docs.kraken.com/api/docs/category/websocket-v1
  baseURL: wss://ws.kraken.com
  tags:
  - Spot
  - WebSocket
  - Legacy
  properties:
  - type: Documentation
    url: https://docs.kraken.com/api/docs/category/websocket-v1
  - type: APIReference
    url: https://docs.kraken.com/api/docs/websocket-v1/ping
- name: Kraken Futures REST API
  description: REST API for the Kraken Futures derivatives exchange (formerly Crypto
    Facilities). Provides trading (send order, edit order, cancel order, cancel all,
    batch order), market data (instruments, tickers, orderbook, history, recent orders),
    account data (accounts, open positions, open orders, fills, notifications, account
    log, transfers, withdrawal), history (account history, execution events, order
    events, trigger events, market history), charts (candles, analytics), and API
    key management endpoints.
  humanURL: https://docs.kraken.com/api/docs/futures-api/trading/get-accounts
  baseURL: https://futures.kraken.com/derivatives/api/v3
  tags:
  - Futures
  - Derivatives
  - REST
  - Trading
  properties:
  - type: Documentation
    url: https://docs.kraken.com/api/docs/futures-api/trading/get-accounts
  - type: APIReference
    url: https://docs.kraken.com/api/docs/category/futures-api/
  - type: Authentication
    url: https://docs.kraken.com/api/docs/guides/futures-api-auth
  - type: OpenAPI
    url: openapi/kraken-futures-rest-openapi.yml
- name: Kraken Futures WebSocket API
  description: Real-time market data and private user feeds for Kraken Futures over
    WebSocket. Public feeds include trade, book, ticker, ticker_lite, heartbeat; private
    feeds include fills, open_positions, open_orders, account_log, notifications_auth,
    deposits_withdrawals.
  humanURL: https://docs.kraken.com/api/docs/category/futures-websocket
  baseURL: wss://futures.kraken.com/ws/v1
  tags:
  - Futures
  - Derivatives
  - WebSocket
  - Market Data
  properties:
